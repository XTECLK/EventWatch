<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>සූර්ය මංගල්යය - 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-overlay"></div>
    
    <header id="main-header" class="fixed-top header" style="display: none;">
        <h1 id="event-name" class="event-title"></h1>
        <p id="event-subtext" class="event-subtitle"></p>
    </header>

    <a id="main-banner-whatsapp" href="#" target="_blank" class="banner-whatsapp" style="display: none; position: fixed; top: 7.25rem; left: 50%; transform: translateX(-50%); z-index: 990; width: calc(100% - 2.5rem); max-width: 600px; background: linear-gradient(135deg, #25D366, #128C7E); color: white; padding: 1rem 1.5rem; border-radius: 16px; text-decoration: none; align-items: center; justify-content: space-between; box-shadow: 0 10px 25px rgba(37, 211, 102, 0.2);">
        <div style="display: flex; flex-direction: column; text-align: left; line-height: 1.3;">
            <span style="font-size: 1rem; font-weight: 800;">සජීවී යාවත්කාලීන</span>
            <span id="whatsapp-banner-text" style="font-size: 0.8rem; font-weight: 600; opacity: 0.95;">WhatsApp චැනලයට එක්වන්න</span>
        </div>
        <div style="background: rgba(255, 255, 255, 0.2); padding: 0.5rem; border-radius: 50%; display: flex;">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.414 0 .004 5.41.001 12.045a11.817 11.817 0 001.592 6.011L0 24l6.117-1.605a11.772 11.772 0 005.925 1.603h.005c6.637 0 12.046-5.411 12.049-12.047a11.824 11.824 0 00-3.576-8.504"/></svg>
        </div>
    </a>

    <main class="container" style="justify-content: center;">
        <!-- Ghost section to keep offset for fixed banner -->
        <div id="banner-ghost" style="display: none; height: 70px;"></div>

        <!-- Loading Area -->
        <div id="loading-area">
            <div class="spinner"></div>
        </div>

        <!-- Main Dashboard View -->
        <div id="main-view" style="display: none; width: 100%;">
            <section id="status-section" class="card">
                <div id="status-container"></div>
            </section>

            <div id="events-main-view">
                <section id="ongoing-section" class="section-box">
                    <h2 class="badge-title">දැන් පැවැත්වේ</h2>
                    <div id="ongoing-events-list" class="list-centered"></div>
                </section>

                <section id="upcoming-section" class="section-box">
                    <h2 class="badge-title">මීලගට</h2>
                    <div id="upcoming-events-list" class="list-centered"></div>
                </section>

                <section id="finished-section" class="section-box">
                    <h2 class="badge-title">නවතම ප්‍රතිඵල</h2>
                    <div id="finished-events-list" class="list-centered"></div>
                </section>
            </div>
        </div>
    </main>

    <!-- Modal for Agenda -->
    <div id="agenda-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <a id="agenda-whatsapp-link" href="#" target="_blank" class="btn btn-whatsapp" style="display: none;">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.414 0 .004 5.41.001 12.045a11.817 11.817 0 001.592 6.011L0 24l6.117-1.605a11.772 11.772 0 005.925 1.603h.005c6.637 0 12.046-5.411 12.049-12.047a11.824 11.824 0 00-3.576-8.504"/></svg>
                <div style="display: flex; flex-direction: column; text-align: left; line-height: 1.2;">
                    <span style="font-size: 0.75rem; font-weight: 800;">Realtime updates</span>
                    <span style="font-size: 0.6rem; font-weight: 600; opacity: 0.9;">අප හා එක්වන්න</span>
                </div>
            </a>
            <h2 class="modal-title">තරග විස්තර</h2>
            <button class="close-modal">&times;</button>
        </div>
            <div id="agenda-content"></div>
        </div>
    </div>



    <!-- Fixed Footer -->
    <footer id="main-footer" class="fixed-bottom footer" style="display: none;">
        <div class="footer-content">
            <div class="footer-row" style="display: flex; gap: 1rem;">
                <button id="view-agenda" class="btn btn-outline" style="flex: 1;">තරග විස්තර</button>
                <a id="photos-link" href="#" target="_blank" class="btn btn-facebook" style="flex: 1;">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                    පින්තූර
                </a>
            </div>
            <div class="subtext" style="text-align: center;">
                සංවිධානය: <span id="organizer-name">නදීබඩවත්ත එක්සත් තරුණ කැළ</span>
            </div>
        </div>
    </footer>

    <!-- Fullscreen Prompt Overlay -->
    <div id="fullscreen-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; padding: 2rem;">
        <div style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 32px; padding: 4rem 2rem; text-align: center; max-width: 400px; width: 100%; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); display: flex; flex-direction: column; align-items: center; gap: 1.5rem;">
            <div style="background: linear-gradient(135deg, var(--primary), var(--secondary)); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3); margin-bottom: 0.5rem;">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
            </div>
            <div style="color: white;">
                <h2 style="font-size: 1.75rem; font-weight: 800; margin-bottom: 0.5rem;">පූර්ණ තිරය</h2>
                <p style="font-size: 0.95rem; opacity: 0.7; line-height: 1.5; font-weight: 500;">පූර්ණ තිර අත්දැකීම ලබා ගැනීමට පහත බොත්තම ඔබන්න.</p>
            </div>
            <button id="enable-fullscreen-btn" class="btn btn-primary" style="width: 100%; padding: 1.2rem; font-size: 1.1rem; border-radius: 16px; margin-top: 1rem; box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);">ආරම්භ කරන්න</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
