<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>සූර්ය මංගල්යය - 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-overlay"></div>
    
    <header id="main-header" class="fixed-top header" style="display: none;">
        <h1 id="event-name" class="event-title"></h1>
        <p id="event-subtext" class="event-subtitle"></p>
    </header>

    <main class="container" style="justify-content: center;">
        <!-- Loading Area -->
        <div id="loading-area">
            <div class="spinner"></div>
        </div>

        <!-- Main Dashboard View -->
        <div id="main-view" style="display: none; width: 100%;">
            <section id="status-section" class="card">
                <div id="status-container"></div>
            </section>

            <div id="events-main-view">
                <section id="ongoing-section" class="section-box">
                    <h2 class="badge-title">දැන් පැවැත්වේ</h2>
                    <div id="ongoing-events-list" class="list-centered"></div>
                </section>

                <section id="upcoming-section" class="section-box">
                    <h2 class="badge-title">මීලගට</h2>
                    <div id="upcoming-events-list" class="list-centered"></div>
                </section>
            </div>
        </div>
    </main>

    <!-- Modal for Agenda -->
    <div id="agenda-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">සම්පූර්ණ න්‍යාය පත්‍රය</h2>
                <button class="close-modal">&times;</button>
            </div>
            <div id="agenda-content"></div>
        </div>
    </div>

    <!-- Fixed Footer -->
    <footer id="main-footer" class="fixed-bottom footer" style="display: none;">
        <div class="footer-content">
            <button id="view-agenda" class="btn btn-outline">න්‍යාය පත්‍රය</button>
            <a id="whatsapp-link" href="https://chat.whatsapp.com/IHM8ixOBBULEKWJp8jGjss?mode=gi_t" target="_blank" class="btn btn-whatsapp">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.414 0 .004 5.41.001 12.045a11.817 11.817 0 001.592 6.011L0 24l6.117-1.605a11.772 11.772 0 005.925 1.603h.005c6.637 0 12.046-5.411 12.049-12.047a11.824 11.824 0 00-3.576-8.504"/></svg>
                නිවේදන
            </a>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
