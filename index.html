<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventWatch - නව අවුරුදු උත්සවය</title>
    <meta name="description" content="නව අවුරුදු උත්සවය සජීවීව නරඹන්න">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-overlay"></div>
    
    <main class="container">
        <header class="header">
            <h1 id="event-name">උත්සවයේ නම</h1>
            <p id="event-subtext" class="subtext">මෙහි උප ශීර්ෂය දිස්වනු ඇත</p>
        </header>

        <section id="status-section" class="card fade-in">
            <!-- Dynamic Countdown or Live Status -->
            <div id="status-container">
                <div class="loader">පූරණය වෙමින්...</div>
            </div>
        </section>

        <section id="ongoing-section" class="events-container fade-in" style="display: none;">
            <h2>දැනට පැවැත්වෙන සිදුවීම්</h2>
            <div id="ongoing-events-list">
                <!-- Ongoing events will be populated here -->
            </div>
        </section>

        <section id="upcoming-section" class="events-container fade-in">
            <h2>ඉදිරි සිදුවීම්</h2>
            <div id="upcoming-events-list">
                <!-- Upcoming events will be populated here -->
            </div>
        </section>

        <footer class="actions">
            <button id="view-agenda" class="btn btn-secondary">සම්පූර්ණ න්‍යාය පත්‍රය</button>
            <a id="whatsapp-link" href="#" target="_blank" class="btn btn-primary">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-10.6 8.5 8.5 0 0 1 3 1.5"></path><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                WhatsApp සමූහයට එක්වන්න
            </a>
        </footer>
    </main>

    <!-- Modal for Agenda -->
    <div id="agenda-modal" class="modal">
        <div class="modal-content card">
            <span class="close-modal">&times;</span>
            <h2>සම්පූර්ණ න්‍යාය පත්‍රය</h2>
            <div id="agenda-content"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
